
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#0a0a0f">
    <title>مُحمّل الفيديوهات | Video Downloader</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        base: {
                            900: '#0a0a0f',
                            800: '#12121a',
                            700: '#1a1a26',
                            600: '#242433',
                        },
                        accent: {
                            500: '#8b5cf6',
                            400: '#a78bfa',
                            300: '#c4b5fd',
                        },
                        glow: {
                            purple: '#7c3aed',
                            pink: '#ec4899',
                            cyan: '#06b6d4',
                        }
                    },
                    fontFamily: {
                        sans: ['"Tajawal"', '"Inter"', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'spin-slow': 'spin 3s linear infinite',
                        'pulse-glow': 'pulse-glow 2s ease-in-out infinite',
                    },
                    keyframes: {
                        'pulse-glow': {
                            '0%, 100%': { opacity: '0.5' },
                            '50%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts: Tajawal (Arabic) + Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(ellipse at top, #1a1a26 0%, #0a0a0f 60%);
            min-height: 100vh;
            font-family: 'Tajawal', sans-serif;
            overflow-x: hidden;
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
            pointer-events: none;
        }
        .blob-1 {
            width: 400px; height: 400px;
            background: #7c3aed;
            top: -100px; right: -100px;
            animation: float-1 20s ease-in-out infinite;
        }
        .blob-2 {
            width: 350px; height: 350px;
            background: #06b6d4;
            bottom: -100px; left: -100px;
            animation: float-2 25s ease-in-out infinite;
        }
        .blob-3 {
            width: 300px; height: 300px;
            background: #ec4899;
            top: 50%; left: 30%;
            animation: float-3 30s ease-in-out infinite;
        }

        @keyframes float-1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-50px, 50px) scale(1.1); }
        }
        @keyframes float-2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, -50px) scale(1.2); }
        }
        @keyframes float-3 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(80px, -30px) scale(0.9); }
            66% { transform: translate(-60px, 40px) scale(1.1); }
        }

        .glass {
            background: rgba(26, 26, 38, 0.6);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .url-input:focus {
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.3), 0 8px 30px rgba(139, 92, 246, 0.15);
            border-color: rgba(139, 92, 246, 0.8);
        }

        .btn-download {
            background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
            background-size: 200% 200%;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-download:hover:not(:disabled) {
            background-position: 100% 100%;
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(124, 58, 237, 0.4);
        }
        .btn-download:active:not(:disabled) {
            transform: translateY(0);
        }
        .btn-download:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-download::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s ease;
        }
        .btn-download:hover:not(:disabled)::before {
            left: 100%;
        }

        .progress-fill {
            background: linear-gradient(90deg, #8b5cf6 0%, #ec4899 50%, #06b6d4 100%);
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
            transition: width 0.3s ease;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .spinner {
            border: 3px solid rgba(139, 92, 246, 0.2);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0f; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #7c3aed, #ec4899);
            border-radius: 4px;
        }

        #progress-card { display: none; }

        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 500;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            opacity: 0;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            pointer-events: auto;
        }
        .toast.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
        }
        .toast.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
            color: #86efac;
        }

        .logo-glow {
            filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.6));
        }

        @media (max-width: 640px) {
            .blob { filter: blur(60px); opacity: 0.3; }
        }
    </style>
</head>
<body class="text-white">

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div id="toast" class="toast"></div>

    <main class="relative z-10 min-h-screen flex flex-col items-center justify-center px-4 py-8 sm:py-12">

        <header id="header" class="text-center mb-8 sm:mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 sm:w-24 sm:h-24 rounded-3xl mb-4 logo-glow"
                 style="background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);">
                <svg class="w-10 h-10 sm:w-12 sm:h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
                </svg>
            </div>
            <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold mb-2 bg-clip-text text-transparent"
                style="background-image: linear-gradient(135deg, #c4b5fd 0%, #f9a8d4 50%, #67e8f9 100%);">
                مُحمّل الفيديوهات
            </h1>
            <p class="text-gray-400 text-sm sm:text-base max-w-md mx-auto">
                الصق أي رابط فيديو من أي موقع واحصل على ملف MP4 بأعلى جودة
            </p>
        </header>

        <section id="main-card" class="glass w-full max-w-xl rounded-3xl p-6 sm:p-8 shadow-2xl">

            <form id="download-form" class="space-y-4">
                <div class="relative">
                    <label for="url-input" class="block text-sm font-medium text-gray-300 mb-2">
                        رابط الفيديو
                    </label>
                    <div class="relative">
                        <input
                            type="url"
                            id="url-input"
                            required
                            dir="ltr"
                            placeholder="https://www.youtube.com/watch?v=..."
                            class="url-input w-full bg-base-700/50 border border-white/10 rounded-2xl px-4 py-4 sm:py-5 pl-12 text-right text-white placeholder-gray-500 outline-none transition-all duration-300 text-sm sm:text-base"
                        >
                        <div class="absolute top-1/2 -translate-y-1/2 left-4 text-gray-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M10.172 13.828a4 4 0 005.656 0l4-4a4 4 0 10-5.656-5.656l-1.1 1.1"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <button
                    type="submit"
                    id="download-btn"
                    class="btn-download w-full py-4 sm:py-5 rounded-2xl font-bold text-white text-base sm:text-lg flex items-center justify-center gap-3 shadow-lg"
                >
                    <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
                    </svg>
                    <span>تحميل الفيديو</span>
                </button>
            </form>

            <div id="progress-card" class="mt-6 pt-6 border-t border-white/10 space-y-4">

                <div id="video-info" class="flex items-center gap-3" style="opacity:0">
                    <img id="video-thumbnail" src="" alt="" class="w-16 h-16 rounded-xl object-cover bg-base-700 hidden">
                    <div class="flex-1 min-w-0">
                        <h3 id="video-title" class="font-bold text-white text-sm sm:text-base truncate"></h3>
                        <p id="video-meta" class="text-xs text-gray-400 mt-0.5"></p>
                    </div>
                </div>

                <div id="status-row" class="flex items-center justify-between text-sm">
                    <div class="flex items-center gap-2">
                        <div id="status-spinner" class="spinner w-4 h-4"></div>
                        <span id="status-text" class="text-gray-300">جاري التحضير...</span>
                    </div>
                    <span id="percentage-text" class="font-bold text-accent-300 text-lg">0%</span>
                </div>

                <div class="w-full h-3 bg-base-700/60 rounded-full overflow-hidden">
                    <div id="progress-bar" class="progress-fill h-full rounded-full" style="width: 0%"></div>
                </div>

                <div class="grid grid-cols-3 gap-2 text-center text-xs">
                    <div class="bg-base-700/40 rounded-xl p-2.5">
                        <div class="text-gray-500 mb-0.5">السرعة</div>
                        <div id="speed-text" class="font-semibold text-cyan-300">—</div>
                    </div>
                    <div class="bg-base-700/40 rounded-xl p-2.5">
                        <div class="text-gray-500 mb-0.5">تم تحميله</div>
                        <div id="downloaded-text" class="font-semibold text-purple-300">—</div>
                    </div>
                    <div class="bg-base-700/40 rounded-xl p-2.5">
                        <div class="text-gray-500 mb-0.5">الحجم</div>
                        <div id="total-text" class="font-semibold text-pink-300">—</div>
                    </div>
                </div>

                <a id="final-download-btn" href="#" download
                   class="hidden w-full py-3.5 rounded-2xl font-bold text-center text-white flex items-center justify-center gap-2 transition-all"
                   style="background: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                    </svg>
                    <span id="final-btn-text">تنزيل الملف</span>
                </a>
            </div>

        </section>

        <footer id="footer" class="mt-8 text-center text-xs text-gray-600 max-w-md">
            <p>الملفات محفوظة مؤقتاً لمدة ساعتين فقط ثم تُحذف تلقائياً</p>
            <p class="mt-1">يدعم YouTube, TikTok, Instagram, Twitter, Facebook وأكثر من 1000 موقع</p>
        </footer>

    </main>

    <script src="/static/script.js"></script>
</body>
</html>
